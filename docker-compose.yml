version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j-kg
    ports:
      - "7687:7687"  # Bolt protocol
      - "7474:7474"  # HTTP
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 2G
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - kg-network

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  kg-network:
    driver: bridge

